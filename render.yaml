services:
  # 1. PostgreSQL Database
  - type: database
    name: polymind-db
    databaseName: polymind
    user: polymind_user
    plan: free

  # 2. Backend (FastAPI)
  - type: web
    name: polymind-backend
    env: python
    rootDirectory: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:8000"
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polymind-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
