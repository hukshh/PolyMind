databases:
  - name: polymind-db
    plan: free

services:
  # 2. Backend (FastAPI via Docker)
  - type: web
    name: polymind-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polymind-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
